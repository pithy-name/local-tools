# Run B — NER + custom_keywords. Demonstrates AC6 (exact-match + mapping)
# closing some gaps NER alone misses (codename, session ID).
entities:
  - PERSON
  - EMAIL_ADDRESS
  - PHONE_NUMBER
  - ORGANIZATION
  - LOCATION
custom_keywords:
  - find: "Project Falcon"
    replace: "[PROJECT-1]"
  - "sess_a1b2c3d4e5f6g7h8"          # plain → default █████
  - "sk-proj-9f8a7b6c5d4e3f2a1b0c"   # exact token → default █████
  - "MacBook Pro M5 Max"                 # hardware spec
replacement: "█████"
spacy_model: en_core_web_sm
output_dir: redacted
include_extensions:
  - .md
  - .html
  - .htm
skip_extensions: []
